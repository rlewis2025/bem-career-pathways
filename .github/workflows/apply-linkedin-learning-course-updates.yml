name: Apply LinkedIn Learning course updates

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-linkedin-learning-course-updates.yml

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Excel readiness course
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          course_url = 'https://www.linkedin.com/learning/excel-essential-training-microsoft-365-2025'

          if course_url not in text:
              anchor = '<div class="ll-kicker">Shared professional core</div>'
              anchor_index = text.find(anchor)
              if anchor_index < 0:
                  raise SystemExit('Shared professional core anchor not found')
              insert_index = text.rfind('  <div class="ll-subsection">', 0, anchor_index)
              if insert_index < 0:
                  raise SystemExit('Shared professional core subsection start not found')
              snippet = '''  <div class="ll-subsection">
    <div class="ll-subhead"><div class="ll-kicker">Excel readiness on-ramp</div><h3>Need an Excel refresher?</h3><p>If you are not yet comfortable organizing data, writing formulas, using tables, sorting and filtering information, and creating basic charts, begin with the course below before starting your program-specific cluster.</p></div>
    <div class="ll-addons"><article class="ll-addon"><strong>Foundational Excel</strong><div class="ll-course-list"><a href="https://www.linkedin.com/learning/excel-essential-training-microsoft-365-2025" target="_blank" rel="noopener"><span>Excel Essential Training (Microsoft 365) (2025)</span><i class="ti ti-external-link" aria-hidden="true"></i></a></div></article></div>
  </div>

'''
              text = text[:insert_index] + snippet + text[insert_index:]
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit updated index and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/apply-linkedin-learning-course-updates.yml
          git commit -m "Add LinkedIn Learning Excel readiness course"
          git push origin main
