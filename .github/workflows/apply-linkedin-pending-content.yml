name: Apply LinkedIn pending content

on:
  push:
    branches:
      - agent/add-linkedin-pending-content

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-linkedin-pending-content
      - name: Patch index
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          url = 'https://www.linkedin.com/learning/excel-essential-training-microsoft-365-2025'
          if url not in text:
              anchor = '<div class="ll-kicker">Shared professional core</div>'
              ai = text.find(anchor)
              if ai < 0:
                  raise SystemExit('Shared professional core anchor not found')
              ii = text.rfind('  <div class="ll-subsection">', 0, ai)
              if ii < 0:
                  raise SystemExit('Shared professional core subsection not found')
              snippet = '''  <div class="ll-subsection">
    <div class="ll-subhead"><div class="ll-kicker">Excel readiness on-ramp</div><h3>Need an Excel refresher?</h3><p>If you are not yet comfortable organizing data, writing formulas, using tables, sorting and filtering information, and creating basic charts, begin with the course below before starting your program-specific cluster.</p></div>
    <div class="ll-addons"><article class="ll-addon"><strong>Foundational Excel</strong><div class="ll-course-list"><a href="https://www.linkedin.com/learning/excel-essential-training-microsoft-365-2025" target="_blank" rel="noopener"><span>Excel Essential Training (Microsoft 365) (2025)</span><i class="ti ti-external-link" aria-hidden="true"></i></a></div></article></div>
  </div>

'''
              p.write_text(text[:ii] + snippet + text[ii:], encoding='utf-8')
          PY
      - name: Commit patch and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-linkedin-pending-content.yml
          git add index.html
          git commit -m "Add pending LinkedIn Learning content"
          git push origin agent/add-linkedin-pending-content
